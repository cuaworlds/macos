# env.toml — RFC 0002 Phase-A/B env package — "macos-jq" (E2 author-once deliverable).
#
# Built from the SHARED recipe explorations/env-build/apps.recipe.sh (APPS="jq vlc"),
# run UNCHANGED in the guest, then frozen by explorations/env-build/freeze-layer.sh.
# This is the KVM/x86_64 leg of interop link #2 ("author once, materialize twice").
#
# The +apps layer carries:  jq 1.8.1 (CLI formula) + VLC 3.0.23 (notarized GUI cask),
# plus the Homebrew/CLT toolchain the bootstrap installed (see [build] note below).
#
# Paths are BOX-SIDE absolute (resolve on the remote KVM host). The resolver skips
# local existence checks for a remote --kvm-host; the fleet's host commands run over
# SSH where these resolve. Boot via:
#   mw bench run --env <this-dir> --backend kvm --kvm-host <your-kvm-host> ...

[env]
name = "macos-jq"
description = "macOS Sonoma 14 + a +apps layer carrying jq 1.8.1 (CLI) and VLC 3.0.23 (GUI), authored from the shared apps.recipe.sh"
macos_version = "14"
guest_user = "user"

[target]
os      = "macos"
arch    = "x86_64"
runtime = "kvm-qcow2"
capabilities = []

# L0 — os-base. The fleet's raw source (data.img); converted+cached to a shared
# read-only qcow2 once. Same gold base W1 used.
[[layers]]
ref    = "~/cua-worlds/base"
format = "qcow2"
role   = "os-base"

# L1 — +apps. Frozen content-addressed layer (freeze-layer.sh shape);
# backing_file=/base/data.qcow2. Authored from apps.recipe.sh (APPS="jq vlc").
[[layers]]
ref    = "~/cua-worlds/layers/00944de70ca6"
digest = "sha256:00944de70ca6033dd6a09684d81cd053c7f4e7e31a4bd9bbe3698a3a0efdcf51"
format = "qcow2"
role   = "apps"

# ── Provenance: how this +apps layer was authored (the "author once" record). ──
[build]
recipe        = "explorations/env-build/apps.recipe.sh"
recipe_id     = "apps.recipe/v1"
apps          = ["jq", "vlc"]            # APPS="jq vlc" passed to the shared recipe
freeze        = "explorations/env-build/freeze-layer.sh"
# NOTE (KVM-leg-specific precondition gap, recorded honestly for E1's index):
# the dockur/macOS gold base ships WITHOUT Homebrew/CLT. The recipe's precondition #1
# (brew present) was therefore satisfied by a one-time in-guest brew bootstrap BEFORE
# running the recipe. The W2 VZ base (cirruslabs) ships Homebrew preinstalled, so the
# VZ leg will NOT need this bootstrap. This base-provisioning asymmetry is NOT part of
# the recipe text — it is an env-build precondition the two bases meet differently.
# See explorations/substrate/E2-author-once.md §"precondition gap".

# ── arm64 / VZ-clonefile chain — FILLED by the E2 VZ leg (2026-06-16, post-E3). ──
# E1's index unifies the two per-arch byte-chains under one logical env ("macos-jq").
# Authored from the SAME apps.recipe.sh (APPS="jq vlc"), run UNCHANGED over SSH on a
# Tart cirruslabs macos-sequoia base (Homebrew preinstalled → NO brew bootstrap, the
# one asymmetry vs the KVM dockur base), then frozen by vz-freeze-layer.sh (clonefile).
# Produced jq 1.8.1 (arm64) + VLC 3.0.23 (arm64 cask) — bit-identical versions to the
# KVM leg above. Layer is the read-only Tart bundle {config.json, disk.img (sparse raw),
# nvram.bin}; format=raw (NOT ASIF — ASIF is Tahoe-only; Sequoia uses sparse raw).
# Proven through the chain: a fresh `tart clone` instance over this layer saw
# /opt/homebrew/bin/jq (1.8.1) + /Applications/VLC.app (3.0.23, arm64 slice) + the
# ~/.cua-apps-recipe.json breadcrumb. See explorations/substrate/E2-author-once.md "VZ LEG".
#
# Sibling target so E1's index resolves macos-jq → {x86_64→this[target], arm64→that}.
# Paths are LOCAL-MAC absolute (the host that holds the arm64 chain); the resolver skips
# existence checks for a non-matching host [target]. The single-target resolver in
# env/pkg.py ignores [[targets]] today — this is the multi-target shape E1 owns.
[[targets]]
os      = "macos"
arch    = "arm64"
runtime = "vz-clonefile"
capabilities = []

# L0 — os-base. The cirruslabs macos-sequoia base (Tart-pulled from IPSW by the host;
# never shipped by us, per the legal model). Same base as e3-base (E3).
[[targets.layers]]
ref    = "ghcr.io/cirruslabs/macos-sequoia-base:latest"
format = "raw"
role   = "os-base"

# L1 — +apps. Frozen content-addressed clonefile bundle (vz-freeze-layer.sh shape).
# Authored from apps.recipe.sh (APPS="jq vlc"); instance = clonefile(this bundle) (CoW).
[[targets.layers]]
ref    = "~/.tart/_layers/801695f74c0d"
digest = "sha256:801695f74c0d85a7ef776b1fff13158d23c75830f179e5ed332e73d4ff06ae9f"
format = "raw"
role   = "apps"
