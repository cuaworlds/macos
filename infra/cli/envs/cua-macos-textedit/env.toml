# env.toml — cua/macos:textedit-v1, MULTI-PLATFORM (E1 of the substrate program).
#
# ONE logical env name resolves to the RIGHT per-platform layer chain on each host,
# via a standard OCI image-index (Docker's multi-arch model). The same `mw env` /
# resolver call yields:
#   host (x86_64, kvm-qcow2)  -> the KVM/qcow2 chain manifest
#   host (arm64,  vz-clonefile) -> the VZ/clonefile chain manifest
#   any other host target     -> fails LOUD ("no matching platform for target=…")
#
# How the chain is carried: a single `[[platform]]` of runtime "oci-index" points at a
# LOCAL oci-layout dir (credential-free; `oras --oci-layout`). The index's two entries
# carry `platform{os,architecture}` + a `cua.target.runtime` annotation; the resolver
# selects the entry matching the detected host target and reads that chain manifest's
# `cua.layer.*` annotations (RFC 0002 §7.5). Rebuild the layout with `./build-index.sh`.
#
# GHCR is the identical flow with `index = "ghcr.io/<org>/cua/macos:textedit-v1"`
# (no `--oci-layout`); see E1-index.md for the one registry caveat (GHCR shows
# artifact-manifest index children as "unknown/unknown" in the UI — cosmetic).

[env]
name = "cua-macos-textedit"
description = "macOS 14 + TextEdit, one logical name → KVM(x86) and VZ(arm64) chains via OCI index"
macos_version = "14"
guest_user = "user"

# A single OCI-index platform. The index itself fans out to the two substrate chains;
# `os` is the only [target] field that matters here (the index dispatches on arch +
# runtime internally). `index` is "<oci-layout-dir>:<tag>" (abs / ~ / rel-to-env.toml).
[[platform]]
  [platform.target]
  os      = "macos"
  runtime = "oci-index"
  index   = "./oci-layout:textedit-v1"
