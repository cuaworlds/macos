# env.toml — RFC 0002 Phase-A/B env package (local-cache-only, KVM/qcow2).
#
# A 2-layer chain proving the os-base ← +apps mechanism end-to-end:
#   os-base : the gold macOS-14 base volume on the KVM box (raw data.img; the fleet
#             converts+caches it to a shared read-only qcow2 once).
#   +apps   : a frozen overlay carrying an unmistakable marker file
#             (/Users/user/.cua-apps-marker = "CUA-LAYER-OK"), built by freeze-layer.sh
#             from a guest booted on this exact base. digest below.
#
# Paths are BOX-SIDE absolute (this env targets the remote KVM host 100.118.89.35).
# The resolver skips local existence checks for a remote --kvm-host; the fleet's host
# commands run over SSH where these paths resolve. Booted via:
#   mw bench run --env <this-dir> --backend kvm --kvm-host 100.118.89.35 ...

[env]
name = "macos-cua-marker"
description = "macOS Sonoma 14 + a trivial +apps marker layer (substrate chain proof)"
macos_version = "14"
guest_user = "user"

[target]
os      = "macos"
arch    = "x86_64"
runtime = "kvm-qcow2"
capabilities = []

# L0 — os-base. The fleet's raw source (data.img), exactly like --kvm-base-volume.
[[layers]]
ref    = "/home/jjmachan/workspace/vibrantlabs/macos-world/base"
format = "qcow2"
role   = "os-base"

# L1 — +apps. Frozen content-addressed layer; backing_file=/base/data.qcow2.
[[layers]]
ref    = "/home/jjmachan/workspace/vibrantlabs/macos-world/layers/a22c98a5d55e"
digest = "sha256:a22c98a5d55e0e78c3cd25e846ae3b0edb1c0ba7a0adc6b78bf7210ad21086f1"
format = "qcow2"
role   = "apps"
